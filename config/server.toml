# Server configuration

include = ["net.toml"]

# General settings
[general]
# Filesystem size in MiB
filesystem_size = 512

# Package settings
[packages]
bash = {}
bottom = {}
ca-certificates = {}
#contain = {} # needs to update dependencies
coreutils = {}
curl = {}
diffutils = {}
extrautils = {}
findutils = {}
git = {}
installer = {}
ion = {}
kibi = {}
pkgutils = {}
redoxfs = {}

[[files]]
path = "/usr/lib/init.d/30_console"
data = """
inputd -A 2
nowait getty 2
nowait getty /scheme/debug/no-preserve -J
"""
[[files]]
path = "/etc/login_config.toml"
data = """
[user_schemes.user]
schemes = ["memory","sudo","sys","file","rand","null","ip","icmp","tcp","udp","thisproc","pty","orbital","display.vesa","uds_stream","uds_dgram","pipe","time","event"]
"""
