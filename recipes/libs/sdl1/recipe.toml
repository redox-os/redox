[source]
git = "https://gitlab.redox-os.org/willnode/sdl1.2.git"
branch = "soft-blit"

[build]
template = "custom"
dependencies = [
    "liborbital"
]
script = """
COOKBOOK_CONFIGURE_FLAGS+=(
    --disable-loadso
    --disable-pulseaudio
    --disable-video-x11
    --enable-clock_gettime
    --enable-pthread-sem
    --enable-redoxaudio
    --enable-video-orbital
)
cookbook_configure
"""
