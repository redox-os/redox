[source]
git = "https://gitlab.redox-os.org/redox-os/sdl1.2.git"

[build]
template = "configure"
dependencies = [
    "liborbital"
]
configure = [
    "--disable-loadso",
    "--disable-pulseaudio",
    "--disable-video-x11",
    "--enable-clock_gettime",
    "--enable-pthread-sem",
    "--enable-redoxaudio",
    "--enable-video-orbital",
]
