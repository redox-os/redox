[source]
same_as = "../os-test"

[build]
dependencies = [
    "gettext",
    "libarchive",
    "libiconv",
]
template = "custom"
script = """
DYNAMIC_INIT

# Copy source to /home/user/os-test
mkdir -p "${COOKBOOK_STAGE}/home/user/os-test"
cd "${COOKBOOK_STAGE}/home/user/os-test"
rsync -a "${COOKBOOK_SOURCE}/" "./"

# Pre-compile tests for Redox
make OS=Redox \
    CC="${CC_WRAPPER} ${GNU_TARGET}-gcc" \
    CFLAGS="-I${COOKBOOK_SYSROOT}/include" \
    CPPFLAGS="-I${COOKBOOK_SYSROOT}/include" \
    LDFLAGS="-L${COOKBOOK_SYSROOT}/lib" \
    EXTRA_LDFLAGS= \
    CC_FOR_BUILD="${CC_WRAPPER} cc" \
    CFLAGS_FOR_BUILD= \
    CPPFLAGS_FOR_BUILD= \
    LDFLAGS_FOR_BUILD= \
    -j "${COOKBOOK_MAKE_JOBS}" \
    all

make OS=Redox \
    CC="${CC_WRAPPER} ${GNU_TARGET}-gcc" \
    CFLAGS="-I${COOKBOOK_SYSROOT}/include" \
    CPPFLAGS="-I${COOKBOOK_SYSROOT}/include" \
    LDFLAGS="-L${COOKBOOK_SYSROOT}/lib" \
    EXTRA_LDFLAGS= \
    misc/html

skips=(
    # These tests hang https://gitlab.redox-os.org/redox-os/redox/-/issues/1752
    basic/poll/poll
    basic/pthread/pthread_barrierattr_setpshared
    basic/pthread/pthread_condattr_setpshared
    basic/pthread/pthread_testcancel
    basic/sys_select/select
    basic/sys_time/select
    basic/sys_wait/waitpid
    signal/ppoll-block-sleep-raise-write
    signal/ppoll-block-sleep-write-raise
)

for skip in "${skips[@]}"
do
    mkdir -p out.known/redox/"$(dirname "${skip}")"
    echo "hang" > out.known/redox/"${skip}.out"
    echo out.known/redox/"${skip}.out" >> "skipped.txt"
done

cp -t out -R out.known/redox

# Create runner script
mkdir -p "${COOKBOOK_STAGE}/usr/bin"
cat > "${COOKBOOK_STAGE}/usr/bin/os-test-runner" <<EOF
#!/usr/bin/env bash
set -e
cd /home/user/os-test

make test html json
EOF
chmod +x "${COOKBOOK_STAGE}/usr/bin/os-test-runner"
"""

[package]
dependencies = [
    "gnu-grep",
    "gnu-make",
    "libarchive",
    "sed",
]

# The installation order must be exact in order to satisfy Makefile requirement
# Cookbook/installer install order is based on package name, while pkg is based on dependencies
[[optional-packages]]
name = "a-sources"
files = [
    "home/user/os-test/**/*.c",
]

[[optional-packages]]
name = "outputs"
dependencies = [ ".bins" ]
files = [
    "home/user/os-test/out/**",
]

[[optional-packages]]
name = "bins"
dependencies = [ ".a-sources" ]
files = [
    "home/user/os-test/**",
]
