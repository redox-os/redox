[source]
# git = "https://gitlab.redox-os.org/redox-os/relibc.git"
git = "https://gitlab.redox-os.org/Ibuki.O/relibc.git"
# branch = "unlinkat"
# branch = "filter-uidgid"
branch = "namespace-improvement"

[build]
template = "custom"
script = """
"${COOKBOOK_MAKE}" \
    -C "${COOKBOOK_SOURCE}" \
    -j"$($NPROC)" \
    CARGO="env -u CARGO cargo" \
    DESTDIR="${COOKBOOK_STAGE}" \
    install
"""
