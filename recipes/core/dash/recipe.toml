[source]
git = "https://gitlab.redox-os.org/redox-os/dash.git"
branch = "redox"
script = """
./autogen.sh
"""

[build]
template = "custom"
script = """
DYNAMIC_INIT
${COOKBOOK_CONFIGURE} \
    --host="${TARGET}" \
    --prefix="/usr" \
    cross_compiling=yes
sed -i -e 's|#define HAVE_GETRLIMIT 1|/* #undef HAVE_GETRLIMIT */|g' config.h
# Skip configure
COOKBOOK_CONFIGURE="true"
COOKBOOK_CONFIGURE_FLAGS=()
cookbook_configure
"""
