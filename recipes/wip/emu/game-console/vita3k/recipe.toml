# dependencies are compiled if not found, use recipes to save time and space
# build instructions: https://github.com/Vita3K/Vita3K/blob/master/building.md#linux
[source]
git = "https://github.com/Vita3K/Vita3K"
shallow_clone = true
[build]
template = "cmake"
cmakeflags = [
    "-DUSE_VITA3K_UPDATE=OFF"
]
dependencies = [
    "sdl2",
    "gtk3",
    "openssl3",
    "boost",
]
