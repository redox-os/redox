#TODO promote
[source]
git = "https://gitlab.redox-os.org/redox-os/gtk"
branch = "redox-3.24.43"
shallow_clone = true

[build]
dependencies = [
    "atk",
    "cairo",
    "expat",
    "fontconfig",
    "freetype2",
    "fribidi",
    "gdk-pixbuf",
    "gettext",
    "glib",
    #TODO "gobject-introspection",
    "harfbuzz",
    "libepoxy",
    "libffi",
    "libiconv",
    "libjpeg",
    "liborbital",
    "libpng",
    "libxfixes",
    "libxkbcommon",
    "libxi",
    "libxrandr",
    "libx11",
    "libwayland",
    "mesa",
    "pango",
    "pcre2",
    "pixman",
    "wayland-protocols",
    "zlib",
]
template = "custom"
script = """
DYNAMIC_INIT
CFLAGS="${CFLAGS} -DM_SQRT2=1.41421356237309504880"
cookbook_meson \
    -Dexamples=false \
    -Dintrospection=false \
    -Dtests=false
"""
