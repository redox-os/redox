[source]
tar = "https://download.gnome.org/sources/libepoxy/1.5/libepoxy-1.5.10.tar.xz"
blake3 = "0ccee9635115fe417cfc4bc33ffd160bf1e2852bd6c03816b4af771d59462f53"
patches = ["redox.patch"]

[build]
template = "meson"
dev-dependencies = [
    "libx11",
    "mesa",
]
mesonflags = [
    "-Degl=yes",
# we're forcing x11 backend via EGL
    "-Dx11=true",
    "-Dtests=false",
]
