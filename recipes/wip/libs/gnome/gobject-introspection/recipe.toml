[source]
tar = "https://download.gnome.org/sources/gobject-introspection/1.84/gobject-introspection-1.84.0.tar.xz"
blake3 = "e01a810629b11b2fa415ba47d2df3ba521286e9933f6c2b364e959c26401eb96"

[build]
template = "custom"
dependencies = [
    "glib",
    "libffi",
]
dev-dependencies = [
    "python312",
    "python312.dev",
    "host:python312",
    "host:python3-setuptools",
    "host:redoxer"
]
script = """
DYNAMIC_INIT
PYTHON_INIT
COOKBOOK_MESON_NEED_EXEC=1

cookbook_meson -Dpython="${COOKBOOK_PYTHON_V}"
sed -i "s|${COOKBOOK_TOOLCHAIN}||g" "${COOKBOOK_STAGE}"/usr/bin/g-ir-annotation-tool
sed -i "s|${COOKBOOK_TOOLCHAIN}||g" "${COOKBOOK_STAGE}"/usr/bin/g-ir-scanner
mv "${COOKBOOK_STAGE}"/usr/lib/gobject-introspection "${COOKBOOK_STAGE}"/usr/lib/${COOKBOOK_PYTHON_V}
"""

[package]
dependencies = [
    "python312",
    "python3-setuptools",
]
