# build instructions: https://libcamera.org/getting-started.html
[source]
git = "https://git.libcamera.org/libcamera/libcamera"
rev = "v0.7.0"
shallow_clone = true
[build]
template = "meson"
mesonflags = [
    "-Ddocumentation=false"
    "-Dpycamera=false",
    "-Dtracing=false",
    "-Dudev=false",
]
dependencies = [
    "libyaml",
    "libevdev",
    "gstreamer",
    "libjpeg",
    "sdl2",
]
