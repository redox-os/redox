# build instructions: https://github.com/LibVNC/libvncserver#how-to-build
[source]
git = "https://github.com/LibVNC/libvncserver"
rev = "LibVNCServer-0.9.15"
shallow_clone = true
[build]
template = "cmake"
cmakeflags = [
    "-DWITH_OPENSSL=ON",
    "-DWITH_GCRYPT=OFF",
    "-DWITH_GTK=OFF",
    "-DWITH_FFMPEG=OFF",
    "-DWITH_QT=OFF",
    "-DWITH_XCB=OFF",
    "-DWITH_SYSTEMD=OFF",
    "-DWITH_TESTS=OFF",
    "-DWITH_IPv6=OFF",
]
dependencies = [
    "openssl3",
    #"ffmpeg6",
    "libssh2",
    "sdl2",
    "libpng",
    "libjpeg",
]
