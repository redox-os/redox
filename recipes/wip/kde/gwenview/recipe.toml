[source]
git = "https://invent.kde.org/graphics/gwenview"
rev = "v26.04.3"
shallow_clone = true
[build]
template = "cmake"
cmakeflags = [
    "-DGWENVIEW_NO_WAYLAND_GESTURES=ON",
    "-DWITHOUT_X11=ON",
    "-DGWENVIEW_IMAGEANNOTATOR=OFF",
]
dependencies = [
    "qt6-base",
    "qt6-multimedia",
    "qt6-svg",
    "kio6",
    "kitemmodels6",
    "ki18n6",
    "kparts6",
    #"kwindowsystem6",
    "kiconthemes6",
    "knotifications6",
    "kguiaddons6",
    "kwidgetsaddons6",
    #"kcrash6",
    "libjpeg",
    "libpng",
    "exiv2",
#]
