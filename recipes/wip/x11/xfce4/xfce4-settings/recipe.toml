
[source]
tar = "https://archive.xfce.org/src/xfce/xfce4-settings/4.21/xfce4-settings-4.21.1.tar.xz"
[build]
dependencies = [
    "host:libxml2",
    "atk",
    "cairo",
    "gdk-pixbuf",
    "glib",
    "gtk3",
    "libice",
    "libsm",
    "libwnck3",
    "libx11",
    "libxfce4ui",
    "libxfce4util",
    "libxfce4windowing",
    "pango",
    "garcon",
    "xfconf",
]
template = "meson"
mesonflags = [
    "-Dwayland=disabled"
]
