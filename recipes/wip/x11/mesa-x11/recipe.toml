[source]
same_as = "../../../libs/mesa"

[build]
template = "custom"
dependencies = [
    "expat",
    "libdrm",
    "libx11",
    "libxcb",
    "libxext",
    "libxfixes",
    "libxrandr",
    "libxshmfence",
    "libxxf86vm",
    "llvm21",
    "zlib",
]
dev-dependencies = [
    "llvm21.dev",
]

script = """
DYNAMIC_INIT
cookbook_meson \
    -Ddri-drivers-path=/usr/lib/dri \
    -Degl=disabled \
    -Dglx=dri \
    -Dllvm=enabled \
    -Dgles1=disabled \
    -Dgles2=disabled \
    -Dplatforms=x11 \
    -Dshader-cache=disabled
"""
